<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mseto Junior School | Learners Today, Leaders Tomorrow</title>
    <style>
        /* CSS Variables for Dark/Light Mode */
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e2640;
            --text-main: #f8fafc;
            --text-muted: #a0aec0;
            --accent-cyan: #38bdf8;
            --accent-red: #ef4444;
            --border-color: #1f293d;
        }

        /* Light Mode Overrides */
        body.light-mode {
            --bg-color: #ffffff;
            --card-bg: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* Navigation */
        header { background-color: var(--bg-color); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-red); position: sticky; top: 0; z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .school-badge { width: 55px; height: 60px; }
        .brand-name { font-size: 1.5rem; font-weight: bold; text-transform: uppercase; }
        nav { display: flex; gap: 20px; align-items: center; }
        nav a { color: var(--text-main); text-decoration: none; font-weight: 500; }
        nav a:hover { color: var(--accent-cyan); }
        .theme-btn { cursor: pointer; background: var(--card-bg); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 6px 12px; border-radius: 4px; }

        /* Hero */
        .hero { padding: 80px 5%; text-align: center; border-bottom: 4px solid var(--accent-cyan); }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }

        /* Contact Section */
        .contact-section { padding: 60px 5%; background-color: var(--card-bg); }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1000px; margin: 0 auto; }
        .map-container { width: 100%; height: 300px; border-radius: 8px; overflow: hidden; border: 2px solid var(--accent-cyan); }

        footer { padding: 40px 5%; text-align: center; border-top: 1px solid var(--border-color); }
    </style>
</head>

        <nav>

    </footer>

    </script>
</body>
</html>
