<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports & Clubs | Mseto Junior School</title>
    <style>
        /* Global & Brookhouse-style Premium Look */
        :root {
            --mseto-dark: #0b0f19;
            --mseto-card: #1e2640;
            --mseto-cyan: #38bdf8;
            --mseto-red: #ef4444;
            --text-light: #f8fafc;
            --text-muted: #a0aec0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #111625; 
            color: var(--text-light); 
            margin: 0; 
            padding: 0;
            line-height: 1.6;
        }

        /* Navigation Header (Exact match to Home) */
        header {
            background-color: var(--mseto-dark);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--mseto-red);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .school-badge { width: 55px; height: 60px; }
        .brand-name { font-size: 1.5rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        nav { display: flex; gap: 25px; align-items: center; }
        nav a { color: var(--text-light); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s; }
        nav a:hover, nav a.active { color: var(--mseto-cyan); }
        .apply-btn { background-color: var(--mseto-red); padding: 8px 16px; border-radius: 4px; font-weight: bold; }
        .apply-btn:hover { background-color: #dc2626; color: white; }

        /* Sports Banner */
        .hero {
            background-color: var(--mseto-dark);
            padding: 60px 5%;
            text-align: center;
            border-bottom: 4px solid var(--mseto-cyan);
        }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; color: var(--text-light); }
        .hero p { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }
.viking-badge-wrapper { 
            margin-bottom: 40px; 

        /* Athletics Content Section */
        .sports-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5%;
            text-align: center;
        }
        
        /* Centered Viking Badge */
        .viking-badge-wrapper { 
            margin-bottom: 40px; 
            display: flex; 
            justify-content: center; 
        }
        .viking-badge-img { 
            width: 150px; 
            height: auto; 
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .team-card {
            background-color: var(--mseto-card);
            border-top: 4px solid var(--mseto-red);
            border-radius: 0 0 8px 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: left;
            position: relative;
        }
        .age-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--mseto-cyan);
            color: var(--mseto-dark);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        /* Fixed Match Photos */
        .match-photo {
            width: 100%;
            height: 250px;
            object-fit: cover; 
            border-radius: 6px;
            margin-top: 15px;
            background-color: #111625;
        }
        
        /* Footer */
        footer { background-color: #05080f; padding: 40px 5%; text-align: center; border-top: 1px solid #1f293d; margin-top: 60px; }
        footer p { color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- Premium Navigation Header -->
    <header>
        <div class="logo-container">
            <div class="school-badge">
                <!-- CUSTOM SVG LOGO -->
                <svg viewBox="0 0 100 110" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,20 L90,20 L80,80 L50,105 L20,80 Z" fill="none" stroke="#38bdf8" stroke-width="4"></path>
                    <path d="M16,25 L84,25 L75,76 L50,98 L25,76 Z" fill="none" stroke="#38bdf8" stroke-width="1.5"></path>
                    <text x="50" y="13" fill="#ef4444" font-size="8.5" font-weight="bold" text-anchor="middle">Proverbs 22:6</text>
                    <text x="24" y="55" fill="#ef4444" font-size="8.5" font-weight="bold" transform="rotate(-74, 24, 55)">MSETO</text>
                    <rect x="30" y="30" width="40" height="10" fill="#0a192f" rx="2"></rect>
                    <text x="50" y="38" fill="#ef4444" font-size="9" font-weight="bold" text-anchor="middle">JUNIOR</text>
                    <text x="76" y="55" fill="#ef4444" font-size="8.5" font-weight="bold" transform="rotate(74, 76, 55)">SCHOOL</text>
                    <g fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round">
                        <path d="M42,52 L42,65 M39,56 L45,56 M40,65 L40,72 M44,65 L44,72" stroke="#38bdf8"></path>
                        <circle cx="42" cy="48" r="2.5" fill="#38bdf8" stroke="none"></circle>
                        <path d="M58,52 L58,65 M55,56 L61,56 M56,65 L56,72 M60,65 L60,72" stroke="#38bdf8"></path>
                        <circle cx="58" cy="48" r="2.5" fill="#38bdf8" stroke="none"></circle>
                        <path d="M45,58 L55,58" stroke="#38bdf8" stroke-width="1"></path>
                    </g>
                    <path d="M5,82 L20,78 L35,84 L50,81 L65,84 L80,78 L95,82 L90,92 L50,96 L10,92 Z" fill="#38bdf8" stroke="none"></path>
                    <text x="50" y="90" fill="#ef4444" font-size="5" font-weight="bold" text-anchor="middle">LEARNERS TODAY LEADERS TOMORROW</text>
                </svg>
            </div>
            <div class="brand-name">Mseto School</div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="academics.html">Academics</a>
            <a href="sports.html" class="active">Sports & Clubs</a>
            <a href="#" class="apply-btn">Admissions</a>
        </nav>
    </header>

    <!-- Sports Hero Banner -->
    <section class="hero">
        <h1>Mseto Vikings Athletics</h1>
        <p>Home of teamwork, discipline, and outstanding sportsmanship.</p>
    </section>

    <!-- Main Content Container -->
    <div class="sports-container">
        
     <!-- Main Club Team Badge -->
        <div class="viking-badge-wrapper">
            <img src="IMG-20260705-WA0000.jpg" alt="Mseto Vikings FC Badge" class="viking-badge-img">
        </div>

        <!-- Team Category Cards Grid -->
        <div class="team-grid">
            
            <!-- Senior Football Team Card -->
            <div class="team-card">
                <span class="age-tag">U15 &amp; ABOVE</span>
                <h2>Senior Team</h2>
                <img src="IMG-20260627-WA0017.jpg" alt="Senior Team Squad Photo" class="match-photo">
            </div>

            <!-- Primary Football Team Card -->
            <div class="team-card">
                <span class="age-tag" style="background-color: var(--mseto-red); color: white;">LOWER PRIMARY</span>
                <h2>Primary Team</h2>
                <img src="IMG-20260627-WA0010.jpg" alt="Primary Team Squad Photo" class="match-photo">
            </div>

        </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Mseto Junior School. All rights reserved.</p>
        <p>Learners Today, Leaders Tomorrow.</p>
    </footer>

</body>
</html>
