<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports - Mseto Junior School</title>
    <style>
           /* --- THE NAV BAR --- */
        header {
            background-color: #0a192f; 
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            flex-wrap: wrap; 
            gap: 15px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0; 
        }

        .school-badge {
            width: 50px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0; 
            transition: transform 0.4s ease;
        }

        .school-badge:hover {
            transform: scale(1.1);
        }

        .brand-name {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap; 
        }

        nav {
            display: flex;
            align-items: center;
            flex-wrap: wrap; 
        }

        nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            margin-left: 15px;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .theme-toggle-btn {
            background: none;
            border: 2px solid #cbd5e1;
            color: #cbd5e1;
            padding: 5px 12px;
            margin-left: 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .theme-toggle-btn:hover {
            color: white;
            border-color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* --- MOBILE LAYOUT SYSTEM --- */
        @media (max-width: 580px) {
            header {
                flex-direction: column;
                text-align: center;
                padding: 15px 10px;
            }
            nav {
                width: 100%;
                justify-content: center;
                gap: 5px;
            }
            nav a {
                margin-left: 0;
                margin-right: 5px;
                font-size: 0.9rem;
            }
            .theme-toggle-btn {
                margin-left: 5px;
            }
        }
        /* Essential styling for your layout */
        body { font-family: sans-serif; background-color: #1a1a1a; color: #ffffff; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #2d2d2d; }
        .logo-text { font-size: 1.5rem; text-decoration: none; color: white; font-weight: bold; }
        .nav-links a { margin-left: 15px; color: white; text-decoration: none; }
        .team-section { margin: 20px; }
        .team-badge-img { width: 100px; }
        .match-photo { width: 100%; max-width: 400px; display: block; margin-top: 10px; }
    </style>
</head>
<body>
 <header>
        <div class="logo-container">
            <div class="school-badge">
                <!-- PURE VECTOR SVG EMBLEM (Matches original shield layout) -->
                <svg viewBox="0 0 100 110" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <!-- Outer Light Blue Shield -->
                    <path d="M10,20 L90,20 L80,80 L50,105 L20,80 Z" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linejoin="round"/>
                    
                    <!-- Inner Shield Outline -->
                    <path d="M16,25 L84,25 L75,76 L50,98 L25,76 Z" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
                    
                    <!-- Proverbs Verse Text Top -->
                    <text x="50" y="13" fill="#ef4444" font-size="8.5" font-weight="bold" text-anchor="middle" font-family="sans-serif">Proverbs 22:6</text>
                    
                    <!-- Vertical Word: MSETO -->
                    <text x="24" y="55" fill="#ef4444" font-size="8.5" font-weight="bold" transform="rotate(-74, 24, 55)" text-anchor="middle">MSETO</text>
                    
                    <!-- Center Banner text: JUNIOR -->
                    <rect x="30" y="30" width="40" height="10" fill="#0a192f" rx="2"/>
                    <text x="50" y="38" fill="#ef4444" font-size="9" font-weight="bold" text-anchor="middle">JUNIOR</text>
                    
                    <!-- Vertical Word: SCHOOL -->
                    <text x="76" y="55" fill="#ef4444" font-size="8.5" font-weight="bold" transform="rotate(74, 76, 55)" text-anchor="middle">SCHOOL</text>
                    
                    <!-- Center Figures Representation -->
                    <g fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round">
                        <!-- Left Figure (Dress) -->
                        <path d="M42,52 L42,65 M39,56 L45,56 M40,65 L40,72 M44,65 L44,72" stroke="#38bdf8"/>
                        <circle cx="42" cy="48" r="2.5" fill="#38bdf8" stroke="none"/>
                        <!-- Right Figure (Trousers) -->
                        <path d="M58,52 L58,65 M55,56 L61,56 M56,65 L56,72 M60,65 L60,72" stroke="#38bdf8"/>
                        <circle cx="58" cy="48" r="2.5" fill="#38bdf8" stroke="none"/>
                        <!-- Connecting center vector line -->
                        <path d="M45,58 L55,58" stroke="#38bdf8" stroke-width="1"/>
                    </g>
                    
                    <!-- Bottom Ribbon Ribbon Layer -->
                    <path d="M5,82 L20,78 L35,84 L50,81 L65,84 L80,78 L95,82 L90,92 L50,96 L10,92 Z" fill="#38bdf8" stroke="#ef4444" stroke-width="1"/>
                    <text x="50" y="90" fill="#ef4444" font-size="5" font-weight="bold" text-anchor="middle">LEARNERS TODAY, LEADERS TOMORROW</text>
                </svg>
            </div>
            <div class="brand-name">Mseto School</div>
        </div>
        <nav>
    <a href="index.html">Home</a>
    <a href="academics.html">Academics</a>
    <a href="sports.html">Sports</a>
    <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()">🌙 Dark</button>
</nav>
    </header>


    <div class="team-section">
        <h1>Mseto Vikings Athletics</h1>
        <p>Home of teamwork, discipline, and outstanding sportsmanship.</p>

        <h3>Mseto Vikings FC Badge</h3>
        <img src="IMG-20260705-WA0000.jpg" alt="Mseto Vikings FC Badge" class="team-badge-img">

        <h3>Senior Team</h3>
        <img src="IMG-20260705-WA0017.jpg" alt="Senior Team" class="match-photo">

        <h3>Primary Team</h3>
        <img src="IMG-20260705-WA0010.jpg" alt="Primary Team" class="match-photo">
    </div>

</body>
</html>
